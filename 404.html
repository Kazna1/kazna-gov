<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Страница не найдена — Казна</title><meta name="robots" content="noindex"><style>body{font:16px/1.6 -apple-system,Segoe UI,Roboto,sans-serif;background:#0f1411;color:#e8efe9;display:flex;min-height:100vh;margin:0;align-items:center;justify-content:center;text-align:center}a{color:#37e0a6}</style></head><body><div><h1>404 — страница не найдена</h1><p>Возможно, она переехала. <a href="/blog">Перейти в блог</a> или <a href="/">на главную</a>.</p></div>
<style id="kg-mobilefix-v2">
/* kg-mobilefix-v2 — мобильные таблицы влезают по ширине + тап-зум схем */
@media (max-width:600px){
  .kg-content table.kg-table,.kg-article table.kg-table,table.kg-table{
    table-layout:fixed !important; width:100% !important; font-size:12.5px !important;
  }
  .kg-table th,.kg-table td{
    white-space:normal !important; word-break:break-word; overflow-wrap:anywhere;
    padding:8px 8px !important; vertical-align:top;
  }
  /* не-kg таблицы (главная/services) и совсем широкие — горизонтальный скролл как фолбэк */
  .kg-content table:not(.kg-table),.t-rec table:not(.kg-table){
    display:block; max-width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; font-size:12.5px;
  }
  .kg-figure__img,.kg-figure img{ cursor:zoom-in; }
  .kg-figure::after{content:"Нажмите, чтобы рассмотреть";display:block;font:600 12px/1.3 inherit;color:#7a7c7a;text-align:center;margin-top:6px;}
}
.kg-zoom-overlay{position:fixed;inset:0;background:rgba(12,16,22,.93);z-index:2147483600;
  display:none;align-items:flex-start;justify-content:flex-start;overflow:auto;padding:16px;}
.kg-zoom-overlay.is-open{display:flex;}
.kg-zoom-overlay img{display:block;width:auto;height:auto;max-width:none;min-width:700px;margin:auto;border-radius:8px;}
.kg-zoom-close{position:fixed;top:12px;right:14px;width:44px;height:44px;border-radius:50%;
  background:#fff;color:#111;border:0;font-size:24px;line-height:44px;text-align:center;cursor:pointer;z-index:2147483601;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.kg-zoom-hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:#fff;
  font:600 13px/1.2 -apple-system,sans-serif;background:rgba(0,0,0,.55);padding:9px 16px;border-radius:22px;z-index:2147483601;}
</style>
<script id="kg-mobilefix-v2-js">
(function(){
 if(window.__kgZoom)return; window.__kgZoom=1;
 var ov=document.createElement('div');ov.className='kg-zoom-overlay';
 ov.innerHTML='<button class="kg-zoom-close" type="button" aria-label="\u0417\u0430\u043a\u0440\u044b\u0442\u044c">\u00d7</button><img alt=""><div class="kg-zoom-hint">\u041b\u0438\u0441\u0442\u0430\u0439\u0442\u0435, \u0447\u0442\u043e\u0431\u044b \u0440\u0430\u0441\u0441\u043c\u043e\u0442\u0440\u0435\u0442\u044c \u00b7 \u043d\u0430\u0436\u043c\u0438\u0442\u0435 \u00d7</div>';
 function mount(){if(!ov.parentNode)document.body.appendChild(ov);}
 if(document.body)mount();else document.addEventListener('DOMContentLoaded',mount);
 var img=ov.querySelector('img'),btn=ov.querySelector('.kg-zoom-close');
 function open(src,alt){img.src=src;img.alt=alt||'';ov.classList.add('is-open');document.documentElement.style.overflow='hidden';}
 function close(){ov.classList.remove('is-open');document.documentElement.style.overflow='';img.src='';}
 btn.addEventListener('click',close);
 ov.addEventListener('click',function(e){if(e.target===ov)close();});
 document.addEventListener('click',function(e){
   var t=e.target.closest && e.target.closest('.kg-figure__img,.kg-figure img');
   if(t&&!ov.classList.contains('is-open')){e.preventDefault();open(t.currentSrc||t.src,t.alt);}
 },true);
 document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
})();
</script>

</body></html>
