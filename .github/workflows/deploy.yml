# Авто-деплой блога kazna-gov.ru на Fornex.
# push в main → GitHub Action заходит по SSH на Fornex → забирает свежий репозиторий
# и зеркалит его в каталог сайта (rsync). Docroot НЕ git-репозиторий — поэтому clone+rsync.
name: deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Fornex via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FORNEX_HOST }}
          username: ${{ secrets.FORNEX_USER }}
          key: ${{ secrets.FORNEX_SSH_KEY }}
          port: ${{ secrets.FORNEX_PORT }}
          script: |
            set -e
            cd ~
            rm -rf kazna_src
            git clone -q https://github.com/Kazna1/kazna-gov.git kazna_src
            rsync -a --delete --exclude='.git' kazna_src/ ${{ secrets.FORNEX_PATH }}/
            echo "deployed: $(cd kazna_src && git rev-parse --short HEAD)"


  # R2.10: пост-деплой smoke — критические поверхности платформы. Ошибка = красный ран (сигнал отката).
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke critical surfaces
        run: |
          set -e
          for u in / /uslugi /obraztsy/ /oshibki/ /glossary/ /voprosy/ /instrumenty/ /api/ /scheta/ /services/open; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://kazna-gov.ru$u")
            echo "$u -> $code"; [ "$code" = "200" ] || exit 1
          done
          curl -s https://kazna-gov.ru/api/graph-statistics.json | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['nodes']>400, d; print('graph nodes:', d['nodes'])"
          curl -s https://kazna-gov.ru/sitemap.xml | grep -c "<url>" >/dev/null
          echo "smoke OK"

  # После успешного деплоя — мгновенно уведомить Bing + Yandex об изменённых страницах (IndexNow).
  indexnow:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ping IndexNow with changed URLs
        run: python3 scripts/indexnow-ping.py "${{ github.event.before }}" "${{ github.sha }}"
