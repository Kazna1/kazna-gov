# .github/workflows/deploy.yml  — для нового репозитория kazna-gov.ru (статика блога)
# Аналог схемы kaznaexpert.ru: push в main → GitHub Action заходит по SSH на Fornex → git pull.
name: deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Fornex via SSH (git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FORNEX_HOST }}        # IP сервера Fornex
          username: ${{ secrets.FORNEX_USER }}    # ssh-пользователь
          key: ${{ secrets.FORNEX_SSH_KEY }}      # приватный deploy-ключ
          port: ${{ secrets.FORNEX_PORT }}        # обычно 22
          script: |
            set -e
            cd ${{ secrets.FORNEX_PATH }}         # напр. /var/www/kazna-blog
            git fetch --all
            git reset --hard origin/main
            # nginx сам отдаёт статику; перезагрузка не нужна
            echo "deployed: $(git rev-parse --short HEAD)"
