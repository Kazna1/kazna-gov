<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- маска фона: rounded square, ink-цвет -->
  <rect width="256" height="256" rx="56" fill="#0E0F0E"/>

  <!-- coral-shift (back layer, +6px влево) — RGB-split signature -->
  <g transform="translate(-6,0)" opacity="0.92">
    <path d="M83 60 H113 V120 L162 60 H198 L143 124 L200 196 H164 L120 138 L113 145 V196 H83 Z"
          fill="#D9603A"/>
  </g>

  <!-- mint основной знак «К» -->
  <path d="M83 60 H113 V120 L162 60 H198 L143 124 L200 196 H164 L120 138 L113 145 V196 H83 Z"
        fill="#15846B"/>

  <!-- маленькая mint-точка (signature dot из брендбука) -->
  <circle cx="200" cy="60" r="6" fill="#15846B"/>
</svg>
