<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Нет интернета — Казна</title>
<style>
  body{
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #FAF6EC;
    color: #0E0F0E;
    font-family: -apple-system, 'Inter', system-ui, sans-serif;
    padding: 24px;
  }
  @media (prefers-color-scheme: dark){ body{ background: #0E0F0E; color: #F5F1E5; } }
  .wrap{ max-width: 480px; text-align: center; }
  h1{ font-family: 'Lora', Georgia, serif; font-size: clamp(2rem, 5vw, 2.6rem); font-weight: 700; letter-spacing: -.02em; margin: 0 0 12px; }
  p{ color: #5C5F63; line-height: 1.55; margin: 0 0 24px; }
  @media (prefers-color-scheme: dark){ p{ color: #A0A29F; } }
  .ico{ font-size: 64px; margin-bottom: 16px; opacity: .6; }
  button{
    background: #0E0F0E; color: #FAF6EC;
    border: 0; padding: 14px 24px; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit;
  }
  @media (prefers-color-scheme: dark){ button{ background: #F5F1E5; color: #0E0F0E; } }
  ul{ text-align: left; margin: 24px 0 0; padding-left: 20px; color: #5C5F63; font-size: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="ico">📡</div>
    <h1>Связь потеряна</h1>
    <p>Нет соединения с сервером. Сохранённые ранее статьи доступны офлайн.</p>
    <button onclick="location.reload()">Попробовать снова</button>
    <ul>
      <li>Проверьте Wi-Fi или мобильный интернет</li>
      <li>Откройте сохранённые в закладки статьи</li>
      <li>Используйте PWA — статьи кешируются автоматически</li>
    </ul>
  </div>
</body>
</html>
